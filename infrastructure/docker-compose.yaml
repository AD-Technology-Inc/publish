networks:
  app:

volumes:
  identity-db-data:
  social-post-db-data:
  social-account-db-data:
  social-publish-db-data:
  redis-data:

services:
  # =========================
  # Traefik reverse proxy
  # src: https://doc.traefik.io/traefik/getting-started/docker
  # =========================
  traefik:
    image: traefik:v3.6.8
    container_name: traefik
    restart: unless-stopped
    networks:
      - app
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yml
      - ./traefik/dynamic:/etc/traefik/dynamic:ro

  # =========================
  # 🌐 FRONTEND
  # =========================
  client:
    build: ../client
    volumes:
      - ../client:/app
      - /app/node_modules
    networks:
      - app
    develop:
      watch:
        - action: rebuild
          path: ../client/package.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`app.localhost`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  # =========================
  # ☁️ GATEWAY
  # =========================
  gateway:
    build: ../gateway/app
    volumes:
      - ../gateway/app:/app
      - /app/.venv
    networks:
      - app
    develop:
      watch:
        - action: rebuild
          path: ../gateway/app/pyproject.toml
    depends_on:
      - identity-service
      # - social-account-service
      # - social-post-service
      # - social-publish-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`gateway.localhost`)"
      - "traefik.http.routers.gateway.entrypoints=web"
      - "traefik.http.services.gateway.loadbalancer.server.port=3001"
      - "traefik.http.routers.gateway.middlewares=gateway-cors@file"

  # =========================
  # 🔐 Identity Service
  # =========================
  identity-service:
    build: ../services/identity-service
    volumes:
      - ../services/identity-service:/app
      - /app/.venv
    networks:
      - app
    develop:
      watch:
        - action: rebuild
          path: ../services/identity-service/pyproject.toml
    depends_on:
      - identity-db

  # identity-worker:
  #   build:
  #     context: ..
  #     dockerfile: services/identity-service/Dockerfile
  #   env_file:
  #     - ../services/identity-service/.env
  #   depends_on:
  #     - identity-db
  #     - redis
  #   command: ["uv", "run", "python", "worker.py"]
  #   networks:
  #     - app

  identity-db:
    image: postgres:18-trixie
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    volumes:
      - identity-db-data:/var/lib/postgresql
    networks:
      - app
    restart: unless-stopped

